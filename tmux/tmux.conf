source-file -q ~/.config/tmux/tmux.conf.local

set -g mouse on
set -g default-terminal "tmux-256color"
set -g history-limit 50000

set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_status_style "rounded"

# Catppuccin application module defaults to a FA child icon; use a terminal glyph instead.
set -g @catppuccin_application_icon " "
set -g @catppuccin_application_color "#{@thm_teal}"

set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "catppuccin/tmux#v2.3.0"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

run-shell 'mkdir -p "$HOME/.tmux/plugins" "$HOME/.config/tmux/plugins"; [ -f "$HOME/.tmux/plugins/tpm/tpm" ] || GIT_TERMINAL_PROMPT=0 git clone --depth 1 https://github.com/tmux-plugins/tpm "$HOME/.tmux/plugins/tpm"'
run-shell 'tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"'
run-shell 'bash "$HOME/.tmux/plugins/tpm/tpm"'
